name: Sync upstream tags

# Mirrors release tags from upstream (earendil-works/pi) into this fork, on a
# schedule and on demand. The heavy lifting lives in scripts/sync-upstream-tags.sh.
on:
#  schedule:
    # Twice daily, ~09:30 and ~21:30 Beijing time (UTC+8). Edit freely.
 #   - cron: '27 1,13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to sync'
        required: true
        default: 'all'
        type: choice
        options:
          - all       # mirror every tag upstream has that this fork lacks (default)
          - latest    # only the single newest missing tag

# Pushing tags needs write access to repo contents.
permissions:
  contents: write

# Don't let two runs race each other.
concurrency:
  group: sync-upstream-tags
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          
      - name: Let git push to origin with a PAT that can push workflow files
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${SYNC_PAT}@github.com/${{ github.repository }}.git"

      - name: Sync tags from upstream
        env:
          MODE: ${{ github.event.inputs.mode || 'all' }}
        run: |
          chmod +x scripts/sync-upstream-tags.sh
          if [ "$MODE" = "latest" ]; then
            bash scripts/sync-upstream-tags.sh
          else
            bash scripts/sync-upstream-tags.sh --all
          fi
